<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学科文化祭2026</title>
<style>
body { font-family: sans-serif; margin: 0; background:#f8fafc; color:#111827; }
header { background:#1e3a8a; color:white; padding:50px 20px; text-align:center; }
main { max-width:800px; margin:auto; padding:24px; }
.card { background:white; padding:24px; border-radius:14px; box-shadow:0 4px 12px rgba(0,0,0,.08); margin:20px 0; }
button { padding:14px 20px; border:0; border-radius:10px; background:#2563eb; color:white; font-size:16px; }
.count { font-size:42px; font-weight:bold; color:#1e3a8a; }
</style>
</head>

<body>
<header>
  <h1>Learning from Data</h1>
  <p>来場者のデータで学ぶ数学</p>
</header>

<main>
  <div class="card">
    <h2>参加者カウンター</h2>
    <p>ボタンを押すと、参加者数がリアルタイムで増えます。</p>
    <button id="joinBtn">参加する</button>
    <p>現在の参加者数</p>
    <div class="count"><span id="count">0</span>人</div>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpX30lW2pJT4N3skRN1CLZKFbDvU5PDH8",
  authDomain: "math-festival-2026.firebaseapp.com",
  databaseURL: "https://math-festival-2026-default-rtdb.firebaseio.com",
  projectId: "math-festival-2026",
  storageBucket: "math-festival-2026.firebasestorage.app",
  messagingSenderId: "308071776370",
  appId: "1:308071776370:web:6a5cd6490810c875e282eb"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const countRef = ref(db, "counter/participants");
const countEl = document.getElementById("count");
const joinBtn = document.getElementById("joinBtn");

onValue(countRef, (snapshot) => {
  countEl.textContent = snapshot.val() || 0;
});

joinBtn.addEventListener("click", () => {
  runTransaction(countRef, (current) => {
    return (current || 0) + 1;
  });
});
</script>

</body>
</html>
