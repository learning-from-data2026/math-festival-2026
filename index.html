<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学科文化祭2026</title>
<style>
body { margin:0; font-family:sans-serif; background:#f8fafc; color:#111827; line-height:1.7; }
header { background:#1e3a8a; color:white; text-align:center; padding:50px 20px; }
main { max-width:850px; margin:auto; padding:24px; }
.card { background:white; padding:24px; border-radius:14px; box-shadow:0 4px 12px rgba(0,0,0,.08); margin:20px 0; }
button { padding:14px 20px; border:0; border-radius:10px; background:#2563eb; color:white; font-size:16px; margin:6px; }
button:hover { opacity:.85; cursor:pointer; }
button:disabled { background:#9ca3af; cursor:not-allowed; }
.doorArea {
  display: flex;
  justify-content: center;
  gap: 18px;
  flex-wrap: wrap;
  margin-top: 24px;
}

.doorBtn {
  width: 130px;
  height: 190px;
  background: linear-gradient(135deg, #7c3f18, #b87333);
  border: 6px solid #4b260f;
  border-radius: 10px 10px 4px 4px;
  color: white;
  font-size: 28px;
  font-weight: bold;
  position: relative;
  box-shadow: 0 8px 0 #3b1f0d;
}

.doorBtn::after {
  content: "";
  position: absolute;

  right: 14px;
  top: 85px;

  width: 10px;
  height: 28px;

  background: linear-gradient(
    to bottom,
    #fde68a,
    #f59e0b
  );

  border-radius: 10px;
  border: 1px solid #b45309;
}

.doorBtn:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 0 #3b1f0d;
}

.doorBtn.selected {
  outline: 5px solid #facc15;
  transform: translateY(-4px);
}

.theoryBox {
  background: #eff6ff;
  border-left: 6px solid #2563eb;
  padding: 16px;
  border-radius: 10px;
}
.result { font-size:24px; font-weight:bold; color:#1e3a8a; }
</style>
</head>

<body>
<header>
  <h1>Learning from Data</h1>
  <p>モンティホール問題を体験しよう</p>
</header>

<main>
  <div class="card">
    <h2>ステップ1：ドアを選ぼう</h2>
    <p>3つのドアのうち、1つだけが当たりです。</p>

<div class="doorArea">
  <button class="doorBtn" data-door="A">A</button>
  <button class="doorBtn" data-door="B">B</button>
  <button class="doorBtn" data-door="C">C</button>
</div>

    <p id="message"></p>
  </div>

  <div class="card" id="choiceArea" style="display:none;">
    <h2>ステップ2：変更しますか？</h2>
    <p id="openDoorText"></p>

    <button id="stayBtn">変更しない</button>
    <button id="switchBtn">変更する</button>
  </div>

  <div class="card" id="resultArea" style="display:none;">
    <h2>ステップ3：結果</h2>
    <p class="result" id="resultText"></p>
  </div>

  <div class="card">
    <h2>リアルタイム集計</h2>
    <p>参加者数：<strong><span id="total">0</span>人</strong></p>

    <h3>変更した人</h3>
    <p>
      <span id="switchTotal">0</span>人中
      <span id="switchWin">0</span>人が当たり
      / 勝率 <strong><span id="switchRate">0</span>%</strong>
    </p>

    <h3>変更しなかった人</h3>
    <p>
      <span id="stayTotal">0</span>人中
      <span id="stayWin">0</span>人が当たり
      / 勝率 <strong><span id="stayRate">0</span>%</strong>
    </p>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCpX30lW2pJT4N3skRN1CLZKFbDvU5PDH8",
authDomain: "math-festival-2026.firebaseapp.com",
databaseURL: "https://math-festival-2026-default-rtdb.firebaseio.com",
projectId: "math-festival-2026",
storageBucket: "math-festival-2026.firebasestorage.app",
messagingSenderId: "308071776370",
appId: "1:308071776370:web:6a5cd6490810c875e282eb"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const statsRef = ref(db, "montyHallGame");

let prizeDoor;
let firstChoice;
let openedDoor;

const doors = ["A", "B", "C"];

const message = document.getElementById("message");
const choiceArea = document.getElementById("choiceArea");
const openDoorText = document.getElementById("openDoorText");
const resultArea = document.getElementById("resultArea");
const resultText = document.getElementById("resultText");

document.querySelectorAll(".doorBtn").forEach(btn => {
  btn.addEventListener("click", () => {
    if (localStorage.getItem("montyHallGameVoted")) {
      message.textContent = "この端末ではすでに参加済みです。";
      return;
    }

    prizeDoor = doors[Math.floor(Math.random() * 3)];
    firstChoice = btn.dataset.door;
    document.querySelectorAll(".doorBtn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    openedDoor = doors.find(d => d !== firstChoice && d !== prizeDoor);

    message.textContent = `あなたはドア${firstChoice}を選びました。`;
    openDoorText.textContent = `司会者がハズレのドア${openedDoor}を開けました。変更しますか？`;
    choiceArea.style.display = "block";
  });
});

document.getElementById("stayBtn").addEventListener("click", () => {
  finishGame(false);
});

document.getElementById("switchBtn").addEventListener("click", () => {
  finishGame(true);
});

function finishGame(switched) {
  if (localStorage.getItem("montyHallGameVoted")) return;

  let finalChoice = firstChoice;

  if (switched) {
    finalChoice = doors.find(d => d !== firstChoice && d !== openedDoor);
  }

  const win = finalChoice === prizeDoor;

  resultArea.style.display = "block";
  resultText.textContent = win
    ? `🎉 当たり！正解はドア${prizeDoor}でした。`
    : `😭 ハズレ。正解はドア${prizeDoor}でした。`;

  localStorage.setItem("montyHallGameVoted", "true");

  const path = switched
    ? (win ? "switchWin" : "switchLose")
    : (win ? "stayWin" : "stayLose");

  runTransaction(ref(db, "montyHallGame/" + path), current => (current || 0) + 1);

  document.getElementById("stayBtn").disabled = true;
  document.getElementById("switchBtn").disabled = true;
}

onValue(statsRef, snapshot => {
  const data = snapshot.val() || {};

  const switchWin = data.switchWin || 0;
  const switchLose = data.switchLose || 0;
  const stayWin = data.stayWin || 0;
  const stayLose = data.stayLose || 0;

  const switchTotal = switchWin + switchLose;
  const stayTotal = stayWin + stayLose;
  const total = switchTotal + stayTotal;

  document.getElementById("total").textContent = total;
  document.getElementById("switchTotal").textContent = switchTotal;
  document.getElementById("switchWin").textContent = switchWin;
  document.getElementById("stayTotal").textContent = stayTotal;
  document.getElementById("stayWin").textContent = stayWin;

  document.getElementById("switchRate").textContent =
    switchTotal ? Math.round((switchWin / switchTotal) * 100) : 0;

  document.getElementById("stayRate").textContent =
    stayTotal ? Math.round((stayWin / stayTotal) * 100) : 0;
});
</script>

</body>
</html>
